name: Fetch trusted news

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Fetch public RSS sources
        run: python scripts/fetch_news.py

      - name: Commit raw news updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw_news.csv
          if git diff --cached --quiet; then
            echo "No raw_news.csv changes."
          else
            git commit -m "Update trusted news feed"
            git push
          fi
